<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Mesh Search - Results</title>
        <link rel="stylesheet" href="/static/css/bootstrap.min.css">
    </head>
    <body>
        <div class="pt-3 px-3">
            <form method="post" action="/search" class="w-100">
                <div class="input-group">
                    <input type="text" id="text-box" name="query" class="form-control" placeholder="mesh://!7d9e2c51/home" title="An endpoint to a node's web page." required>
                    <button class="btn btn-primary ms-2" id="search-button" name="action" value="search" type="submit" title="Get the latest version of the page">Search</button>
                    <button class="btn btn-primary ms-2" id="quick-search-button" name="action" value="quick-search" type="submit" title="Use a saved copy of the page if available">Quick Search</button>
                </div>
            </form>
            <div id="character-count" class="mt-3">
                <div class="progress" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="200">
                    <div id="character-count-bar" class="progress-bar bg-success" style="width: 0%"></div>
                </div>
                <span id="character-count-value" class="text-success">0/200</span>
            </div>
        </div>
        
        <div id="search-results" class="pt-3 px-3">
            {{ content | safe }}
        </div>
    </body>
    
    <script src="/static/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/main.js"></script>
</html>
